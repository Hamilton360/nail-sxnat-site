<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nail_sxnat</title>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- NAVBAR -->
    <header>
        <nav class="navbar">
            <h1 class="logo">nail_sxnat</h1>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#prices">Prices</a></li>
                <li><a href="#policies">Policies</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- HERO -->
    <section id="home" class="hero fade-in">
        <img src="images/logo.png" alt="logo" class="hero-logo">
        <h2>Luxury Nail Services</h2>
        <p>Clean. Precise. Beautiful sets every time.</p>
        <a href="#contact" class="btn">Book Now</a>
    </section>

    <!-- PRICES -->
    <section id="prices" class="section fade-in">
        <h2>Price List</h2>
        <img src="images/prices.png" alt="prices" class="content-img">
    </section>

    <!-- POLICIES -->
    <section id="policies" class="section dark fade-in">
        <h2>Policies</h2>
        <img src="images/policies.png" alt="policies" class="content-img">
    </section>

<!-- GALLERY -->
<section id="gallery" class="section fade-in">
    <h2>Gallery</h2>

    <div class="gallery-grid">
        <img src="images/nail1.jpg" alt="nails">
        <img src="images/nail2.jpg" alt="nails">
        <img src="images/nail3.jpg" alt="nails">
        <img src="images/nail4.jpg" alt="nails">
        <img src="images/nail5.jpg" alt="nails">
        <img src="images/nail6.jpg" alt="nails">
    </div>
</section>

    <!-- CONTACT -->
    <section id="contact" class="section fade-in">
        <h2>Contact & Booking</h2>
        <p>DM on Instagram to book your appointment</p>
        <a href="https://www.instagram.com/nail_sxnat/" target="_blank" class="btn">Book on Instagram →
        </a>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 nail_sxnat</p>
    </footer>

</div>

<!-- IMAGE MODAL -->
<div id="imageModal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="modalImg">
</div>

<script src="script.js"></script>

</body>
</html>
